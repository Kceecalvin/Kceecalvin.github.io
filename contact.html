<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Kencalvin Mwenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#6366f1' }
                }
            }
        }
    </script>
</head>
<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased transition-colors duration-300">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-tight text-primary">Kencalvin.</a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html" class="font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Home</a>
                <a href="about.html" class="font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">About</a>
                <a href="services.html" class="font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Services</a>
                <a href="projects.html" class="font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Projects</a>
                <a href="contact.html" class="font-medium text-primary">Contact</a>
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <svg class="hidden dark:block w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg class="block dark:hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20">
        <div class="container mx-auto px-6">
            <div class="max-w-5xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    
                    <div>
                        <h1 class="text-4xl md:text-6xl font-extrabold mb-8">Let's <span class="text-primary">Connect</span>.</h1>
                        <p class="text-xl text-slate-600 dark:text-slate-400 mb-12 leading-relaxed">
                            Have a project in mind or just want to chat about the latest in AI and Security? I'm always open to new opportunities.
                        </p>

                        <div class="space-y-8">
                            <div>
                                <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Email</h4>
                                <a href="mailto:kcalvinmwenda@gmail.com" class="text-2xl font-bold hover:text-primary transition-colors">kcalvinmwenda@gmail.com</a>
                            </div>
                            <div>
                                <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Phone</h4>
                                <a href="tel:0748324656" class="text-2xl font-bold hover:text-primary transition-colors">0748 324 656</a>
                            </div>
                            <div>
                                <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Socials</h4>
                                <div class="flex gap-6 mt-4">
                                    <a href="https://github.com/Kceecalvin" class="font-bold hover:text-primary transition-colors">GitHub</a>
                                    <a href="#" class="font-bold hover:text-primary transition-colors">LinkedIn</a>
                                    <a href="#" class="font-bold hover:text-primary transition-colors">Twitter</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="p-8 md:p-12 bg-slate-50 dark:bg-slate-900/50 rounded-3xl border border-slate-200 dark:border-slate-800">
                        <form action="https://formspree.io/f/xpwjlrpj" method="POST" class="space-y-6">
                            <div>
                                <label class="block text-sm font-bold mb-2 uppercase tracking-tighter">Full Name</label>
                                <input type="text" name="name" placeholder="John Doe" class="w-full bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-4 outline-none focus:border-primary transition-colors" required>
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2 uppercase tracking-tighter">Email Address</label>
                                <input type="email" name="email" placeholder="john@example.com" class="w-full bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-4 outline-none focus:border-primary transition-colors" required>
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2 uppercase tracking-tighter">Message</label>
                                <textarea name="message" rows="5" placeholder="Tell me about your project..." class="w-full bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-4 outline-none focus:border-primary transition-colors" required></textarea>
                            </div>
                            <button type="submit" class="w-full py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/25">Send Message</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-slate-200 dark:border-slate-800">
        <div class="container mx-auto px-6 text-center">
            <p class="text-slate-500 text-sm">&copy; 2026 Kencalvin Mwenda.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
